<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Neighborhood Internet Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Inline favicon -->
  <link rel="icon" href="data:image/svg+xml,
    <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
      <circle cx='50' cy='50' r='45' fill='%234f46e5'/>
    </svg>">

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <!-- MarkerCluster CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
  />

  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <!-- ===========================
       TOPBAR
  ============================ -->
  <header class="topbar">
    <div class="brand">
      <span class="logo-dot"></span>
      <span class="brand-text">Neighborhood Internet Map</span>
    </div>

    <div class="topbar-right">
      <button id="theme-toggle" class="btn btn-ghost">🌙 Dark</button>
      <button id="refresh-btn" class="btn btn-ghost">Refresh</button>
    </div>
  </header>

  <!-- ===========================
       MAIN LAYOUT
  ============================ -->
  <main class="layout">
    <!-- LEFT PANEL -->
    <section class="left-panel">
      <!-- Submit Report -->
      <div class="panel-section">
        <h2>Submit a report</h2>
        <p class="hint">Click the map to set your location.</p>

        <form id="report-form" class="form">
          <div class="form-row">
            <label>Download (Mbps)</label>
            <input id="download" type="number" step="0.1" required />
          </div>

          <div class="form-row">
            <label>Upload (Mbps)</label>
            <input id="upload" type="number" step="0.1" required />
          </div>

          <div class="form-row">
            <label>Ping (ms)</label>
            <input id="ping" type="number" step="0.1" required />
          </div>

          <div class="form-row">
            <label>Jitter (ms)</label>
            <input id="jitter" type="number" step="0.1" required />
          </div>

          <div class="form-row">
            <label>ISP</label>
            <input id="isp" type="text" required />
          </div>

          <div class="form-row">
            <label>Experience</label>
            <select id="rating" required>
              <option value="">Select</option>
              <option value="smooth">Smooth</option>
              <option value="ok">OK</option>
              <option value="bad">Bad</option>
              <option value="unusable">Unusable</option>
            </select>
          </div>

          <div class="form-row">
            <label>Location</label>
            <div class="location-indicator">
              <span id="location-status">Click map to set location</span>
            </div>
          </div>

          <input id="lat" type="hidden" />
          <input id="lng" type="hidden" />

          <button id="submit-btn" class="btn btn-primary" type="submit">
            Submit
          </button>

          <p id="form-message" class="form-message"></p>
        </form>
      </div>

      <!-- Stats -->
      <div class="panel-section">
        <h2>Stats (last 2000)</h2>
        <div class="stats-grid">
          <div class="stat-card">
            <span class="stat-label">Avg download</span>
            <span id="stat-download" class="stat-value">–</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Avg upload</span>
            <span id="stat-upload" class="stat-value">–</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Avg ping</span>
            <span id="stat-ping" class="stat-value">–</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Reports</span>
            <span id="stat-count" class="stat-value">–</span>
          </div>
        </div>
      </div>

      <!-- Legend -->
      <div class="panel-section">
        <h2>Legend</h2>
        <ul class="legend">
          <li><span class="legend-dot legend-smooth"></span> Smooth</li>
          <li><span class="legend-dot legend-ok"></span> OK</li>
          <li><span class="legend-dot legend-bad"></span> Bad</li>
          <li><span class="legend-dot legend-unusable"></span> Unusable</li>
        </ul>
      </div>
    </section>

    <!-- MAP PANEL -->
    <section class="map-panel">

      <!-- ===========================
           MAP TOOLBAR 
      ============================ -->
      <div class="map-toolbar">
        <div class="map-toolbar-left">
          <select id="isp-filter">
            <option value="">All ISPs</option>
          </select>

          <select id="rating-filter">
            <option value="">All experiences</option>
            <option value="smooth">Smooth</option>
            <option value="ok">OK</option>
            <option value="bad">Bad</option>
            <option value="unusable">Unusable</option>
          </select>

          <button id="heatmap-toggle" class="btn btn-ghost" data-active="false">
            Heatmap: Off
          </button>
        </div>

        <div class="map-toolbar-right">
          <input
            id="search-input"
            type="text"
            placeholder="Search place…"
            class="search-input"
          />
          <button id="search-btn" class="btn btn-ghost">Search</button>
        </div>
      </div>

      <!-- MAP -->
      <div id="map"></div>
    </section>
  </main>

  <!-- ===========================
       FOOTER
  ============================ -->
  <footer class="footer">
    <span>Built with Supabase + Leaflet</span>
    <span>
      Anonymous, block-level data only ·
      <button id="export-btn" class="btn btn-ghost" style="padding:2px 8px;font-size:11px;">
        Export CSV
      </button>
    </span>
  </footer>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- MarkerCluster JS -->
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <!-- Heatmap plugin -->
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

  <!-- App -->
  <script type="module" src="app.js"></script>
</body>
</html>
